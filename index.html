<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Daily Weapon 💵</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #f8fafc;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.35), transparent 30%),
        radial-gradient(circle at top right, rgba(124,58,237,.30), transparent 30%),
        linear-gradient(135deg, #020617, #0f172a 45%, #111827);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 28px 34px;
      background: rgba(2,6,23,.75);
      border-bottom: 1px solid rgba(148,163,184,.22);
      backdrop-filter: blur(18px);
    }

    h1 { margin: 0; font-size: 38px; letter-spacing: -1px; }
    h2 { margin: 0 0 14px; font-size: 24px; }
    h3 { margin: 0 0 10px; }

    .page {
      padding: 24px;
      max-width: 1500px;
      margin: 0 auto;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 18px;
    }

    .card {
      background: linear-gradient(135deg, rgba(30,41,59,.88), rgba(15,23,42,.74));
      border: 1px solid rgba(148,163,184,.25);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
    }

    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        linear-gradient(135deg, rgba(37,99,235,.55), rgba(124,58,237,.35)),
        rgba(15,23,42,.8);
    }

    .metric {
      cursor: pointer;
      transition: .18s ease;
      min-height: 125px;
    }

    .metric:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(37,99,235,.35);
    }

    .label {
      font-size: 12px;
      color: #bfdbfe;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: .08em;
    }

    .value {
      font-size: 34px;
      font-weight: 900;
      margin-top: 8px;
    }

    .note {
      color: #cbd5e1;
      font-size: 13px;
      margin-top: 8px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      border-radius: 18px;
      background: rgba(15,23,42,.62);
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(148,163,184,.16);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: rgba(2,6,23,.85);
      color: #bfdbfe;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    tr:hover td { background: rgba(59,130,246,.08); }

    button {
      padding: 10px 13px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.25);
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      font-weight: 800;
      cursor: pointer;
      margin: 4px 4px 4px 0;
    }

    button:hover { transform: translateY(-1px); }

    textarea, input, select {
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,.22);
      background: rgba(15,23,42,.9);
      color: white;
      margin: 8px 0 12px;
    }

    textarea { min-height: 150px; }

    .agent {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 13px;
      border-radius: 16px;
      background: rgba(30,41,59,.75);
      border: 1px solid rgba(148,163,184,.18);
      margin-bottom: 10px;
    }

    .pill {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: rgba(37,99,235,.35);
      color: #bfdbfe;
    }

    .high { color: #fb7185; font-weight: 900; }
    .medium { color: #facc15; font-weight: 900; }
    .low { color: #4ade80; font-weight: 900; }

    a { color: #93c5fd; font-weight: 800; }

    .section { margin-bottom: 18px; }
  
    .preview-scroll {
      max-height: 420px;
      overflow-y: auto;
      overflow-x: auto;
      border-radius: 18px;
    }

    .jump-button {
      margin-bottom: 12px;
    }

    .good-score { color:#4ade80; font-weight:900; }
    .okay-score { color:#fb923c; font-weight:900; }
    .bad-score { color:#f87171; font-weight:900; }

    .market-intel-card {
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
      align-items: center !important;
      text-align: center !important;
      min-height: 360px;
    }

    .market-intel-card .metric-row {
      width: 100%;
      align-items: stretch;
      margin-top: 18px !important;
    }
</style>
</head>

  <script>
    let tenants = [];

    let pipeline = JSON.parse(localStorage.getItem("pipeline") || "{}");

    function saveLog(){ localStorage.setItem("callLog", JSON.stringify(callLog)); }
    function savePipeline(){ localStorage.setItem("pipeline", JSON.stringify(pipeline)); }

    function clean(v){ return v || ""; }

    function score(t){
      let s = 0;
      const text = [
        t["Tenant Company"], t["AI Business Summary"], t["AI Business Type"],
        t["AI Expansion Signals"], t["AI Broker Angle"], t["Notes"], t["Website"]
      ].join(" ").toLowerCase();

      if (t["Local Contact"]) s += 25;
      if (t["Business Phone (Local Contact) (Contact)"] || t["Mobile Phone (Local Contact) (Contact)"]) s += 20;
      if (t["Email"]) s += 15;
      if (t["Website"]) s += 10;
      if (t["Lease End Date"]) s += 20;
      if (text.includes("expansion")) s += 25;
      if (text.includes("new location")) s += 25;
      if (text.includes("hiring")) s += 15;
      if (text.includes("franchise")) s += 15;
      if (text.includes("retail")) s += 10;
      if (text.includes("medical")) s += 10;
      if (text.includes("restaurant")) s += 10;
      if (text.includes("service")) s += 8;

      return s;
    }

    function scoreLabel(score){
      if(score >= 90) return "🟢 Good";
      if(score >= 50) return "🟠 Okay";
      return "🔴 Bad";
    }

    function scoreClass(score){
      if(score >= 90) return "good-score";
      if(score >= 50) return "okay-score";
      return "bad-score";
    }

    function level(score){
      if(score >= 70) return "high";
      if(score >= 40) return "medium";
      return "low";
    }

    function scoreSignal(title) {
      const text = title.toLowerCase();
      let score = 0;
      if (text.includes("expansion")) score += 30;
      if (text.includes("new location")) score += 30;
      if (text.includes("opening")) score += 25;
      if (text.includes("lease")) score += 20;
      if (text.includes("acquires") || text.includes("acquisition")) score += 20;
      if (text.includes("permits") || text.includes("permit")) score += 20;
      if (text.includes("tampa")) score += 15;
      if (text.includes("florida")) score += 10;
      if (text.includes("hiring")) score += 10;
      return score;
    }

    function signalPriority(score) {
      if (score >= 50) return "HIGH";
      if (score >= 25) return "MEDIUM";
      return "LOW";
    }

    function generateSignalEmail(signal){
      return `Subject: Quick note on ${signal.tenant}

Hi,

I came across this recently and thought of you:

Are you the right person to speak with, or is there someone else on your team I should connect with?

Best,
Connor`;

    function addTestSignal(){
      matchedSignals = [{
        tenant: "National Waterproofing Supply",
        title: "National Waterproofing Supply expansion opportunity in Tampa",

    function refreshSignals(){
      matchedSignals = [];
      fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent("https://news.google.com/rss/search?q=tampa+commercial+real+estate+tenant+expansion"))
        .then(res => res.text())
        .then(str => new DOMParser().parseFromString(str, "text/xml"))
        .then(data => {
          const items = [...data.querySelectorAll("item")].slice(0, 25);
          items.forEach(i => {
            const title = i.querySelector("title")?.textContent || "";
            const link = i.querySelector("link")?.textContent || "";
            tenants.forEach(t => {
              const tenant = (t["Tenant Company"] || "").toLowerCase();
              if(!tenant || tenant.length < 4) return;
              const words = tenant.replace(/[^a-z0-9 ]/g, "").split(" ").filter(w => w.length > 3);
              const simpleTitle = title.toLowerCase().replace(/[^a-z0-9 ]/g, "");
              const matches = words.filter(w => simpleTitle.includes(w)).length;
              if(matches >= Math.min(2, words.length)) {
                const signalScore = scoreSignal(title);
                matchedSignals.push({
                  tenant: t["Tenant Company"],
                  title, link, signalScore,
                  priority: signalPriority(signalScore)
                });
              }
            });
          });
          matchedSignals.sort((a,b) => b.signalScore - a.signalScore);
          render();
        })
        .catch(() => {
          alert("Could not load live signals right now. Test Signal still works.");
        });
    }

    function parseLeaseDate(value){
      if(!value) return null;

      const text = String(value).trim();
      const parsed = new Date(text);

      if(!isNaN(parsed)) return parsed;

      const months = {
        jan:0, january:0,
        feb:1, february:1,
        mar:2, march:2,
        apr:3, april:3,
        may:4,
        jun:5, june:5,
        jul:6, july:6,
        aug:7, august:7,
        sep:8, sept:8, september:8,
        oct:9, october:9,
        nov:10, november:10,
        dec:11, december:11
      };

      const parts = text.toLowerCase().replace(",", "").split(/\s+/);
      const month = months[parts[0]];
      const year = parts.find(p => /^20\d{2}$/.test(p));

      if(month !== undefined && year) {
        return new Date(Number(year), month, 1);
      }

      return null;
    }

    function contactScore(t){
      let s = 0;
      if(t["Local Contact"]) s += 40;
      if(t["Business Phone (Local Contact) (Contact)"]) s += 25;
      if(t["Mobile Phone (Local Contact) (Contact)"]) s += 25;
      if(t["Email"]) s += 20;
      if(t["Website"]) s += 10;
      return s;
    }

    function pipelineSort(a,b){
      const cutoff = new Date(2028, 0, 1);

      const aDate = parseLeaseDate(a["Lease End Date"]);
      const bDate = parseLeaseDate(b["Lease End Date"]);

      const aUrgent = aDate && aDate <= cutoff;
      const bUrgent = bDate && bDate <= cutoff;

      if(aUrgent && bUrgent){
        return aDate - bDate || contactScore(b) - contactScore(a);
      }

      if(aUrgent && !bUrgent) return -1;
      if(!aUrgent && bUrgent) return 1;

      return contactScore(b) - contactScore(a);
    }

    function swapAgentsAndMarket(){
      const cards = [...document.querySelectorAll(".card")];

      const marketCard = cards.find(card =>
        card.innerText.includes("Market Intelligence")

      const agentCard = cards.find(card =>
        card.innerText.includes("Active Agents")
      );

      if(marketCard && agentCard){
        const marketClone = marketCard.cloneNode(true);
        const agentClone = agentCard.cloneNode(true);

        marketCard.replaceWith(agentClone);
        agentCard.replaceWith(marketClone);
      }
    }

    function swapMarketAndSignals(){
      const cards = [...document.querySelectorAll(".card")];

      const marketCard = cards.find(card =>
        card.innerText.includes("Market Intelligence")

      const signalCard = cards.find(card =>
        card.innerText.includes("Signal-Based Leads")

      if(marketCard && signalCard){
        const marketClone = marketCard.cloneNode(true);
        const signalClone = signalCard.cloneNode(true);

        marketCard.replaceWith(signalClone);
        signalCard.replaceWith(marketClone);
      }
    }

    function parseLeaseDate(value){
      if(!value) return null;

      const text = String(value).trim();
      const parsed = new Date(text);

      if(!isNaN(parsed)) return parsed;

      const months = {
        jan:0, january:0,
        feb:1, february:1,
        mar:2, march:2,
        apr:3, april:3,
        may:4,
        jun:5, june:5,
        jul:6, july:6,
        aug:7, august:7,
        sep:8, sept:8, september:8,
        oct:9, october:9,
        nov:10, november:10,
        dec:11, december:11
      };

      const parts = text.toLowerCase().replace(",", "").split(/\s+/);
      const month = months[parts[0]];
      const year = parts.find(p => /^20\d{2}$/.test(p));

      if(month !== undefined && year) {
        return new Date(Number(year), month, 1);
      }

      return null;

    function filterProspects(){
      const q = document.getElementById("prospectSearch").value.toLowerCase();

      const filtered = tenants
        .map((t, i) => ({...t, index: i}))
        .filter(t =>
          String(t["Tenant Company"] || "").toLowerCase().includes(q) ||
          String(t["Address"] || "").toLowerCase().includes(q) ||
          String(t["Local Contact"] || "").toLowerCase().includes(q) ||
          String(t["Email"] || "").toLowerCase().includes(q)
        );

      const selected = filtered[0] || tenants[0];

      if(selected){
        const index = selected.index !== undefined ? selected.index : 0;
        document.getElementById("selectedProspectIndex").value = index;
        renderOutreachEmail();
      }
    }

      document.getElementById("subjectBox").value = email.subject;
      document.getElementById("emailBox").value = email.body;
      document.getElementById("prospectEmail").value = clean(prospect["Email"]) || "[No email on file]";
